<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DDMRP{% endblock %} · DDMRP Planning</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">DDMRP <span>Planning</span></div>
    <nav>
      <a href="/"                 data-nav="dashboard">Dashboard</a>
      <a href="/planning"         data-nav="planning">Planning</a>
      <a href="/upload"           data-nav="upload">Stock Upload</a>
      <a href="/alerts"           data-nav="alerts">Alerts</a>
      <a href="/uploads/history"  data-nav="history">Upload History</a>
    </nav>
    <div class="status" id="snapshot-status">…</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
